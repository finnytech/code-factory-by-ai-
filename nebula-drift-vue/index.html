<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Drift - Vue</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border: 1px solid #00ffcc;
            border-radius: 5px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff;
        }
        input[type=range] {
            accent-color: #ff00ff;
        }
    </style>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <canvas ref="nebulaCanvas"></canvas>
        <div class="overlay">
            <h1>Nebula Drift</h1>
            <p>Particles: {{ particleCount }}</p>
            <p>Status: <span style="color: #ff00ff;">{{ status }}</span></p>
        </div>
        <div class="controls">
            <label>Speed: {{ speed }}</label><br>
            <input type="range" min="1" max="10" v-model="speed" @input="updateSettings">
            <br><br>
            <label>Complexity: {{ complexity }}</label><br>
            <input type="range" min="100" max="1000" v-model="complexity" @input="updateSettings">
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
